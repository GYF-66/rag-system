services:
  backend:
    build:
      context: .
      target: production
    container_name: student-ai-backend-prod
    env_file:
      - .env.production
    environment:
      MONGODB_URL: ${MONGODB_URL}
      MONGODB_DATABASE: ${MONGODB_DATABASE}
      REDIS_URL: ${REDIS_URL}
      SESSION_BACKEND: ${SESSION_BACKEND:-redis}
      SECRET_KEY: ${SECRET_KEY}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      STRICT_PRODUCTION_MODE: ${STRICT_PRODUCTION_MODE:-true}
      PUBLIC_DEMO_MODE: ${PUBLIC_DEMO_MODE:-false}
      CORS_ORIGINS: ${CORS_ORIGINS}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_API_BASE_URL: ${LLM_API_BASE_URL}
      LLM_MODEL: ${LLM_MODEL}
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./database:/app/database:ro
      - backend-logs:/app/logs
    restart: unless-stopped
    ports:
      - '8001:8001'
    networks:
      - student-ai-network
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8001/health/ready']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: student-ai-frontend-prod
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - '80:80'
    networks:
      - student-ai-network
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://localhost/']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  mongo:
    image: mongo:6.0
    container_name: student-ai-mongo-prod
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped
    networks:
      - student-ai-network
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', 'db.adminCommand("ping")']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

  redis:
    image: redis:7-alpine
    container_name: student-ai-redis-prod
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - student-ai-network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

volumes:
  mongo-data:
  redis-data:
  backend-logs:

networks:
  student-ai-network:
    driver: bridge
