services:
  backend:
    build:
      context: .
      target: production
    container_name: student-ai-backend
    ports:
      - '8001:8001'
    environment:
      MONGODB_URL: mongodb://${MONGO_INITDB_ROOT_USERNAME:-admin}:${MONGO_INITDB_ROOT_PASSWORD:-changeme}@mongo:27017
      MONGODB_DATABASE: ${MONGODB_DATABASE:-ai_assistant_db}
      REDIS_URL: redis://redis:6379/0
      SESSION_BACKEND: ${SESSION_BACKEND:-auto}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_API_BASE_URL: ${LLM_API_BASE_URL}
      SECRET_KEY: ${SECRET_KEY}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      STRICT_PRODUCTION_MODE: ${STRICT_PRODUCTION_MODE:-false}
      PUBLIC_DEMO_MODE: ${PUBLIC_DEMO_MODE:-true}
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./database:/app/database:ro
    restart: unless-stopped
    networks:
      - student-ai-network
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8001/health/ready']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: student-ai-frontend
    ports:
      - '80:80'
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - student-ai-network
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://localhost/']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

  mongo:
    image: mongo:6.0
    container_name: student-ai-mongo
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-changeme}
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped
    networks:
      - student-ai-network
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', 'db.adminCommand("ping")']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  redis:
    image: redis:7-alpine
    container_name: student-ai-redis
    ports:
      - '6379:6379'
    restart: unless-stopped
    networks:
      - student-ai-network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'

volumes:
  mongo-data:

networks:
  student-ai-network:
    driver: bridge
