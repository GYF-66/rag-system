<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="安信工AI小助手 - 基于人工智能专业知识库的智能问答系统">
    <title>安信工AI小助手 - 人工智能专业智能助手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* 基础设置 */
        :root {
            --primary: #10b981;
            --primary-hover: #059669;
            --accent: #6366f1;
            --surface: rgba(255, 255, 255, 0.85);
            --shadow-subtle: 0 2px 8px rgba(0, 0, 0, 0.04);
            --shadow-medium: 0 8px 24px rgba(0, 0, 0, 0.08);
            --shadow-strong: 0 12px 32px rgba(0, 0, 0, 0.12);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
        }

        /* 侧边栏优化 */
        .sidebar {
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.95) 0%, rgba(255, 255, 255, 0.9) 100%);
            backdrop-filter: saturate(180%) blur(12px);
            border-right: 1px solid rgba(0, 0, 0, 0.06);
        }

        .sidebar-item {
            position: relative;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 10px;
            margin: 2px 8px;
        }

        .sidebar-item:hover {
            background: rgba(0, 0, 0, 0.04);
            transform: translateX(2px);
        }

        .sidebar-item.active {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.1) 0%, rgba(99, 102, 241, 0.08) 100%);
        }

        .sidebar-item.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 3px;
            height: 60%;
            background: linear-gradient(180deg, #10b981 0%, #6366f1 100%);
            border-radius: 0 4px 4px 0;
        }

        /* 搜索框优化 */
        .search-wrapper {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            border: 1.5px solid rgba(0, 0, 0, 0.06);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04),
                        0 1px 3px rgba(0, 0, 0, 0.02);
        }

        .search-wrapper:focus-within {
            border-color: var(--primary);
            box-shadow: 0 8px 32px rgba(16, 185, 129, 0.12),
                        0 2px 8px rgba(0, 0, 0, 0.04);
            transform: translateY(-2px);
        }

        /* 快速启动按钮 */
        .quick-btn {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border: 1.5px solid rgba(0, 0, 0, 0.06);
            border-radius: 100px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .quick-btn:hover {
            background: white;
            border-color: var(--primary);
            box-shadow: 0 4px 16px rgba(16, 185, 129, 0.16);
            transform: translateY(-2px);
        }

        .quick-btn:active {
            transform: translateY(0);
        }

        /* 顶部导航 */
        .navbar {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: saturate(180%) blur(12px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.06);
        }

        /* 用户头像 */
        .avatar {
            background: linear-gradient(135deg, #10b981 0%, #6366f1 100%);
            transition: all 0.2s;
        }

        .avatar:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 16px rgba(99, 102, 241, 0.3);
        }

        /* Logo 容器 */
        .logo-container {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.1) 0%, rgba(99, 102, 241, 0.08) 100%);
            border-radius: 12px;
            transition: all 0.2s;
        }

        .logo-container:hover {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.15) 0%, rgba(99, 102, 241, 0.12) 100%);
        }

        /* 移动端导航 */
        .mobile-nav-item {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .mobile-nav-item.active {
            color: var(--primary);
        }

        .mobile-nav-item.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 24px;
            height: 3px;
            background: linear-gradient(135deg, #10b981 0%, #6366f1 100%);
            border-radius: 2px;
        }

        /* Focus 按钮 */
        .focus-btn {
            background: rgba(0, 0, 0, 0.04);
            border-radius: 10px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .focus-btn:hover {
            background: rgba(99, 102, 241, 0.1);
            color: var(--accent);
        }

        .focus-btn.active {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.1) 0%, rgba(16, 185, 129, 0.08) 100%);
            color: var(--accent);
        }

        /* 提交按钮 */
        .submit-btn {
            background: linear-gradient(135deg, #10b981 0%, #6366f1 100%);
            border-radius: 12px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.24);
        }

        .submit-btn:not(:disabled):hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.32);
        }

        .submit-btn:not(:disabled):active {
            transform: scale(0.98);
        }

        /* 滚动条美化 */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(0, 0, 0, 0.1);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 0, 0, 0.16);
        }

        /* 工具提示 */
        .tooltip {
            position: relative;
        }

        .tooltip::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%) translateY(-4px);
            margin-bottom: 8px;
            padding: 6px 12px;
            font-size: 12px;
            font-weight: 500;
            color: white;
            background: rgba(0, 0, 0, 0.85);
            border-radius: 8px;
            white-space: nowrap;
            opacity: 0;
            visibility: hidden;
            transition: all 0.2s;
            z-index: 1000;
        }

        .tooltip:hover::after {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0);
        }

        /* 通知徽章 */
        .notification-badge {
            position: absolute;
            top: -2px;
            right: -2px;
            min-width: 18px;
            height: 18px;
            padding: 0 5px;
            font-size: 10px;
            font-weight: 600;
            line-height: 18px;
            text-align: center;
            color: white;
            background: linear-gradient(135deg, #ef4444 0%, #f97316 100%);
            border-radius: 9px;
            border: 2px solid white;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
            50% { box-shadow: 0 0 0 6px rgba(239, 68, 68, 0); }
        }

        /* 加载动画 */
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .spinner {
            animation: spin 0.8s linear infinite;
        }

        /* 成功动画 */
        @keyframes checkmark {
            0% { transform: scale(0); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .checkmark {
            animation: checkmark 0.3s ease-out;
        }

        /* 响应式优化 */
        @media (max-width: 1024px) {
            .sidebar {
                width: 64px;
            }
            .sidebar-text {
                display: none;
            }
        }
    </style>
</head>

                <div class="flex justify-around items-center py-2 px-2">
                    <button class="mobile-nav-item active relative flex flex-col items-center space-y-1 px-5 py-2">
                        <i class="fa-solid fa-house text-lg"></i>
                        <span class="text-xs font-bold">首页</span>
                    </button>
                    <button class="mobile-nav-item relative flex flex-col items-center space-y-1 px-5 py-2 text-slate-500">
                        <i class="fa-solid fa-compass text-lg"></i>
                        <span class="text-xs font-bold opacity-0 transition-opacity duration-200 hover:opacity-100">发现</span>
                    </button>
                    <button class="mobile-nav-item relative flex flex-col items-center space-y-1 px-5 py-2 text-slate-500">
                        <i class="fa-solid fa-book text-lg"></i>
                        <span class="text-xs font-bold opacity-0 transition-opacity duration-200 hover:opacity-100">手册</span>
                    </button>
                    <button class="mobile-nav-item relative flex flex-col items-center space-y-1 px-5 py-2 text-slate-500">
                        <i class="fa-solid fa-user text-lg"></i>
                        <span class="text-xs font-bold opacity-0 transition-opacity duration-200 hover:opacity-100">我的</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // DOM 元素
        const searchInput = document.getElementById('searchInput');
        const submitBtn = document.getElementById('submitBtn');
        const focusBtn = document.getElementById('focusBtn');
        const focusChevron = document.getElementById('focusChevron');
        const quickBtns = document.querySelectorAll('.quick-btn');
        const sidebarItems = document.querySelectorAll('.sidebar-item');
        const mobileNavItems = document.querySelectorAll('.mobile-nav-item');

        // 更新提交按钮
        function updateSubmit() {
            if (searchInput.value.trim()) {
                submitBtn.disabled = false;
                submitBtn.classList.remove('opacity-40', 'cursor-not-allowed');
            } else {
                submitBtn.disabled = true;
                submitBtn.classList.add('opacity-40', 'cursor-not-allowed');
            }
        }

        // 处理搜索
        function handleSearch() {
            const query = searchInput.value.trim();
            if (query) {
                console.log('搜索：', query);
                // 加载动画
                submitBtn.innerHTML = '<i class="fa-solid fa-spinner spinner"></i>';
                setTimeout(() => {
                    submitBtn.innerHTML = '<i class="fa-solid fa-check checkmark"></i>';
                    setTimeout(() => {
                        submitBtn.innerHTML = '<i class="fa-solid fa-arrow-up text-base"></i>';
                    }, 1500);
                }, 800);
            }
        }

        // 切换侧边栏激活状态
        function activateSidebar(item) {
            sidebarItems.forEach(i => i.classList.remove('active'));
            item.classList.add('active');
        }

        // 切换移动端导航
        function activateMobileNav(item) {
            mobileNavItems.forEach(i => {
                i.classList.remove('active');
                i.querySelector('span').classList.add('opacity-0');
            });
            item.classList.add('active');
            item.querySelector('span').classList.remove('opacity-0');
        }

        // 事件监听
        searchInput.addEventListener('input', updateSubmit);
        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && searchInput.value.trim()) handleSearch();
        });
        submitBtn.addEventListener('click', () => !submitBtn.disabled && handleSearch());

        focusBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            focusBtn.classList.toggle('active');
            focusChevron.classList.toggle('rotate-180');
        });

        quickBtns.forEach(btn => {
            btn.addEventListener('click', function() {
                const query = this.dataset.query;
                if (query) {
                    searchInput.value = query;
                    searchInput.focus();
                    updateSubmit();
                    this.style.transform = 'scale(0.95)';
                    setTimeout(() => this.style.transform = '', 100);
                }
            });
        });

        sidebarItems.forEach(item => {
            item.addEventListener('click', () => activateSidebar(item));
        });

        mobileNavItems.forEach(item => {
            item.addEventListener('click', () => activateMobileNav(item));
        });

        // 键盘快捷键
        document.addEventListener('keydown', (e) => {
            if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
                e.preventDefault();
                searchInput.focus();
            }
            if (e.key === 'Escape') {
                if (searchInput.value) {
                    searchInput.value = '';
                    updateSubmit();
                } else {
                    searchInput.blur();
                }
            }
        });

        // 自动聚焦
        window.addEventListener('load', () => {
            setTimeout(() => searchInput.focus(), 300);
        });

        console.log('🚀 安信工AI小助手已启动');
    </script>
</body>
</html>
