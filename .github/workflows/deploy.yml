name: Deploy Compose Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run backend tests
        run: pytest --cov=backend --cov-report=term-missing --cov-report=xml

      - name: Run frontend build
        working-directory: frontend
        run: npm run build

      - name: Run frontend unit tests
        working-directory: frontend
        run: npm run test:ci

      - name: Create deploy bundle
        run: bash scripts/create_deploy_bundle.sh

      - name: Upload deploy bundle to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: deploy_bundle.tar.gz
          target: /opt/ai-major-rag/
          overwrite: true

      - name: Release on remote compose stack
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          envs: GITHUB_SHA
          script: |
            set -euo pipefail
            DEPLOY_ROOT="/opt/ai-major-rag"
            APP_DIR="${DEPLOY_ROOT}/app"
            BUNDLE_PATH="${DEPLOY_ROOT}/deploy_bundle.tar.gz"
            BACKUP_DIR="${DEPLOY_ROOT}/backup-$(date +%Y%m%d-%H%M%S)"

            mkdir -p "${DEPLOY_ROOT}"
            if [ -d "${APP_DIR}" ]; then
              cp -a "${APP_DIR}" "${BACKUP_DIR}"
            fi
            mkdir -p "${APP_DIR}"
            tar -xzf "${BUNDLE_PATH}" -C "${APP_DIR}"

            cd "${APP_DIR}"
            set -a
            . ./.env.production
            set +a
            docker compose -f docker-compose.prod.yml --env-file .env.production up -d --build

            FRONTEND_PORT="${FRONTEND_PORT:-8080}"
            BACKEND_PORT="${BACKEND_PORT:-8001}"

            curl -fsS "http://127.0.0.1:${FRONTEND_PORT}/health"
            curl -fsS "http://127.0.0.1:${BACKEND_PORT}/health/ready"

            STREAM_OUTPUT="$(curl -sN --max-time 40 -X POST "http://127.0.0.1:${BACKEND_PORT}/api/chat/stream" \
              -H 'Accept: text/event-stream' \
              -H 'Content-Type: application/json' \
              --data '{"message":"Describe the core competencies of the AI major.","use_rag":true,"enable_thinking":true}' | head -n 20)"

            echo "${STREAM_OUTPUT}" | grep 'event: metadata'
            echo "${STREAM_OUTPUT}" | grep 'event: token'

            echo "release_sha=${GITHUB_SHA}"
            echo "rollback_dir=${BACKUP_DIR}"
