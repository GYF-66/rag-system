# pytest配置文件
[tool:pytest]
# 测试目录
testpaths = tests

# Python文件模式
python_files = test_*.py

# Python类模式
python_classes = Test*

# Python函数模式
python_functions = test_*

# 最小版本
minversion = 7.0

# 添加选项
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    -p no:cacheprovider
    --color=yes

# 标记
markers =
    slow: 标记为慢速测试（运行时间>5秒）
    integration: 集成测试
    unit: 单元测试
    benchmark: 性能基准测试
    asyncio: 异步测试

# 异步测试配置
asyncio_mode = auto

# 覆盖率配置
[coverage:run]
source = .
omit = 
    */tests/*
    */venv/*
    */__pycache__/*
    */site-packages/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
